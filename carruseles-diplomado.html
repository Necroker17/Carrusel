    {t:"log",tag:"¿Cómo funciona?",hl:"100% online.\nA tu ritmo.\nSin excusas.",it:[{ic:"📅",tx:"27 julio – 18 octubre 2026 (14 semanas)"},{ic:"💻",tx:"Clases en vivo + grabaciones siempre disponibles"},{ic:"⏱",tx:"8 meses de acceso posterior a las grabaciones"},{ic:"🌎",tx:"Disponible desde cualquier país de Latinoamérica"},{ic:"🗣",tx:"Traducción en tiempo real para clases en otro idioma"},{ic:"🏆",tx:"Certificado con aval internacional al finalizar"}]},
    {t:"urg",tag:"Actúa ahora",hl:"El diplomado abre\ncon mínimo 100\ninscritos.\n¿Ya aseguraste\ntu cupo?",bd:"Cada día que esperas es un cupo que alguien más está asegurando ahora.",ug:"⚡ Precio especial termina el 15 de junio de 2026",sb:"No dejes que tu formación dependa de la decisión que podrías tomar mañana."},
    {t:"cta",hl:"El conocimiento\nno espera.\nTampoco tus\npacientes.",ct:"Asegura tu cupo ahora →",dt:"Inicio: 27 julio 2026 · 100% Online",ug:"Precio especial solo hasta el 15 de junio"}
   ]}
];

let ci=0,si=0;

function hl(txt,sz){
  const lines=txt.split("\n").length;
  const b=sz||(lines>3?19:23);
  const mn=Math.max(b-5,13);
  return `<div class="sh" style="font-size:clamp(${mn}px,${(b*0.26).toFixed(1)}vw,${b}px);">${txt.replace(/\n/g,"<br>")}</div>`;
}
function stag(txt,col){
  col=col||"var(--gold)";
  return `<div class="stag" style="color:${col};"><div class="bar" style="background:${col};"></div>${txt}</div>`;
}
function rng(bl){return `<div class="rings${bl?" bl":""}"><div class="r r1"></div><div class="r r2"></div><div class="r r3"></div></div>`;}

function rd(s){
  switch(s.t){
    case"cov":return`<div class="slide bg-navy" style="padding:20px 20px 24px;justify-content:space-between;">${rng()}
      <div class="rel" style="display:flex;justify-content:space-between;align-items:center;">
        <span style="font-size:9px;font-weight:700;color:var(--gold);letter-spacing:1px;">F&amp;G · Diplomado</span>
        <span style="font-size:9px;color:var(--faint);">${D[ci].id}/5</span>
      </div>
      <div style="flex:1;"></div>
      <div class="rel">${stag(s.tag)}${hl(s.hl,s.hl.split("\n").length>3?19:24)}
        ${s.bd?`<div class="sp">${s.bd}</div>`:""}
        ${s.ac?`<div class="sacc">${s.ac}</div>`:""}
      </div></div>`;

    case"pro":return`<div class="slide bg-dark" style="padding:20px;justify-content:center;">
      ${stag(s.tag,"var(--red)")}${hl(s.hl,18)}
      <div>${s.it.map(i=>`<div class="pr">${i}</div>`).join("")}</div>
      ${s.bd?`<div class="sp" style="color:var(--gold);">${s.bd}</div>`:""}</div>`;

    case"ins":return`<div class="slide bg-dark" style="padding:20px;justify-content:center;">
      ${stag(s.tag,"var(--red)")}${hl(s.hl,18)}
      <div class="sp">${s.bd}</div>
      ${s.qt?`<div class="qt">"${s.qt}"</div>`:""}</div>`;

    case"con":return`<div class="slide bg-dark" style="padding:20px;justify-content:center;">
      <div style="font-size:22px;margin-bottom:10px;">${s.ic}</div>
      ${stag(s.tag)}${hl(s.hl,17)}
      <div class="sp">${s.bd}</div>
      ${s.in?`<div class="ins">→ ${s.in}</div>`:""}</div>`;

    case"sol":return`<div class="slide bg-blue" style="padding:20px;justify-content:center;position:relative;">${rng(true)}
      <div class="rel">${stag(s.tag)}${hl(s.hl,18)}
        ${s.bd?`<div class="sp">${s.bd}</div>`:""}
        ${s.st?`<div class="stats">${s.st.map(x=>`<div class="stat"><div class="stn">${x.n}</div><div class="stl">${x.l}</div></div>`).join("")}</div>`:""}</div></div>`;

    case"cta":return`<div class="slide bg-blue" style="padding:20px;justify-content:space-between;position:relative;">${rng()}
      <div class="rel"><span style="font-size:9px;font-weight:700;color:var(--gold);letter-spacing:1px;">F&amp;G Educational Society</span></div>
      <div class="rel"><div class="sh italic" style="font-size:clamp(18px,5vw,22px);">${s.hl.replace(/\n/g,"<br>")}</div></div>
      <div class="rel">
        <a class="cbtn" href="${L}" target="_blank" rel="noopener">${s.ct}</a>
        <div class="cd">📅 ${s.dt}</div>
        <div style="text-align:center;"><span class="cu">⚡ ${s.ug}</span></div>
      </div></div>`;

    case"spk":return`<div class="slide bg-dark" style="padding:18px 18px 14px;">
      <div style="display:flex;align-items:center;gap:9px;margin-bottom:11px;">
        <span style="font-size:18px;">${s.ar}</span>
        <div><div style="font-size:8px;font-weight:700;letter-spacing:2px;color:${s.ac};text-transform:uppercase;">${s.tag}</div>
        <div style="font-size:9px;color:var(--faint);">Ponentes destacados</div></div>
      </div>
      ${s.sp.map(x=>`<div class="spc" style="border-left:3px solid ${s.ac};">
        <div class="spn">${x.nm}</div>
        <div class="spc2" style="color:${s.ac};">${x.ct}</div>
        <div class="spr">${x.rl}</div>
      </div>`).join("")}</div>`;

    case"wld":return`<div class="slide bg-blue" style="padding:20px;justify-content:center;position:relative;">${rng(true)}
      <div class="rel">${stag(s.tag)}${hl(s.hl,18)}
        <div style="margin:9px 0;">${s.ch.map(x=>`<span class="chip">${x}</span>`).join("")}</div>
        <div class="sp">${s.bd}</div></div></div>`;

    case"prg":return`<div class="slide bg-dark" style="padding:16px 16px 12px;">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;">
        <div style="width:26px;height:26px;border-radius:7px;background:rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center;font-size:13px;border:1px solid rgba(255,255,255,.1);">${s.ic}</div>
        <div style="font-size:8px;font-weight:700;letter-spacing:2px;color:${s.co};text-transform:uppercase;">${s.tag}</div>
      </div>
      ${s.md.map((m,i,a)=>`<div class="mr${i<a.length-1?" dl":""}">
        <div class="mn" style="color:${s.co};">${i+1}</div>
        <div class="mt">${m}</div>
      </div>`).join("")}
      <div class="mf" style="background:rgba(255,255,255,.04);color:${s.co};">🎓 ${s.po}</div></div>`;

    case"ben":return`<div class="slide bg-blue" style="padding:20px;">
      ${stag(s.tag)}${hl(s.hl,17)}
      ${s.it.map(x=>`<div class="br"><span class="bi">${x.ic}</span><span class="bt">${x.tx}</span></div>`).join("")}</div>`;

    case"rev":return`<div class="slide bg-blue" style="padding:20px;justify-content:center;position:relative;">${rng(true)}
      <div class="rel">${stag(s.tag)}${hl(s.hl,18)}
        ${s.bd?`<div class="sp" style="color:var(--text);">${s.bd}</div>`:""}
        ${s.it?`<div>${s.it.map((x,i,a)=>`<div class="ri${i<a.length-1?" dl":""}">${x}</div>`).join("")}</div>`:""}</div></div>`;

    case"cmp":return`<div class="slide bg-dark" style="padding:16px 16px 12px;">
      ${stag(s.tag,"var(--red)")}
      <div style="display:flex;gap:7px;flex:1;">
        <div class="cc" style="background:rgba(224,85,85,.08);border:1px solid rgba(224,85,85,.22);">
          <div class="cl" style="color:var(--red);">✗ ${s.lf.lb}</div>
          ${s.lf.it.map((x,i,a)=>`<div class="ci${i<a.length-1?" dl":""}" style="color:rgba(255,255,255,.55);">${x}</div>`).join("")}
        </div>
        <div class="cc" style="background:rgba(230,184,77,.09);border:1px solid rgba(230,184,77,.44);">
          <div class="cl" style="color:var(--gold);">✓ ${s.ri.lb}</div>
          ${s.ri.it.map((x,i,a)=>`<div class="ci${i<a.length-1?" dl":""}" style="color:var(--text);">${x}</div>`).join("")}
        </div>
      </div></div>`;

    case"prc":return`<div class="slide bg-dark" style="padding:20px;justify-content:center;">
      ${stag(s.tag)}${hl(s.hl,16)}
      <div style="margin-top:9px;">
        ${s.op.map(x=>`<div class="row" style="background:${x.hi?"rgba(230,184,77,.12)":"rgba(255,255,255,.04)"};border:${x.hi?"1.5px solid rgba(230,184,77,.55)":"1px solid rgba(255,255,255,.1)"};">
          <div><div class="pn" style="color:${x.hi?"var(--gold)":"var(--text)"};">${x.lb}</div><div class="pt">${x.nt}</div></div>
          <div class="pa" style="color:${x.hi?"var(--gold)":"#fff"};">${x.am}</div>
        </div>`).join("")}</div></div>`;

    case"log":return`<div class="slide bg-dark" style="padding:20px;">
      ${stag(s.tag)}${hl(s.hl,17)}
      <div style="margin-top:5px;">
        ${s.it.map((x,i,a)=>`<div class="lr${i<a.length-1?" dl":""}"><span class="li">${x.ic}</span><span class="lt">${x.tx}</span></div>`).join("")}</div></div>`;

    case"urg":return`<div class="slide bg-red" style="padding:20px;justify-content:center;position:relative;">
      <div class="uglow"></div>
      <div class="rel">${stag(s.tag,"var(--red)")}${hl(s.hl,20)}
        ${s.bd?`<div class="sp">${s.bd}</div>`:""}
        ${s.ug?`<div class="ub">${s.ug}</div>`:""}
        ${s.sb?`<div class="sp" style="font-size:10px;">${s.sb}</div>`:""}</div></div>`;
  }
  return"";
}

function draw(){
  const car=D[ci],sl=car.sl;
  document.getElementById("tabs").innerHTML=D.map((c,i)=>
    `<button class="tab${i===ci?" on":""}" onclick="pick(${i})">${c.em} ${c.lb}</button>`).join("");
  document.getElementById("card").innerHTML=rd(sl[si]);
  document.getElementById("dots").innerHTML=sl.map((_,i)=>
    `<button class="dot${i===si?" on":""}" onclick="go(${i})"></button>`).join("");
  document.getElementById("pb").disabled=si===0;
  document.getElementById("nx").disabled=si===sl.length-1;
  document.getElementById("ctr").textContent=`Slide ${si+1} de ${sl.length} · ${car.lb}`;
  document.getElementById("sb").innerHTML=`
    <div class="ic">
      <div class="it">Carrusel ${car.id} de 5</div>
      <div class="ih">${car.inf.ti}</div>
      <div class="id">${car.inf.de}</div>
      <span class="badge">🎯 ${car.inf.ai}</span>
    </div>
    <div class="ic">
      <div class="it">CTA de este carrusel</div>
      <div class="id">Todos los slides finales dirigen a la landing page del diplomado.</div>
      <a class="lc" href="${L}" target="_blank" rel="noopener">Ver landing page →</a>
      <div style="text-align:center;margin-top:10px;font-size:10px;color:var(--faint);">📅 27 jul – 18 oct 2026 · 100% Online</div>
    </div>`;
}

function go(n){const l=D[ci].sl.length;if(n>=0&&n<l){si=n;draw();}}
function nav(d){go(si+d);}
function pick(n){ci=n;si=0;draw();}

let tx=null;
document.addEventListener("touchstart",e=>{if(e.target.closest("#card"))tx=e.touches[0].clientX;},{passive:true});
document.addEventListener("touchend",e=>{
  if(tx!==null&&e.target.closest("#card")){
    const dx=tx-e.changedTouches[0].clientX;
    if(Math.abs(dx)>38)nav(dx>0?1:-1);
  }
  tx=null;
},{passive:true});
document.addEventListener("keydown",e=>{
  if(e.key==="ArrowRight")nav(1);
  if(e.key==="ArrowLeft")nav(-1);
  if(e.key>="1"&&e.key<="5")pick(+e.key-1);
});
draw();
</script>
</body>
</html>
