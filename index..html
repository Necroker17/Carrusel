<script>
const C={navy:"#0A1628",navyD:"#06101C",blue:"#1E4D8C",blueL:"#3A7BD5",gold:"#E6B84D",goldL:"#F0C94A",derm:"#4A9EBF",endo:"#E8B84D",nutri:"#4CAF82",red:"#E05555",text:"rgba(255,255,255,0.88)",soft:"rgba(255,255,255,0.58)",faint:"rgba(255,255,255,0.32)"};

function rings(color){color=color||C.gold;return`<div style="position:absolute;top:-55px;right:-55px;width:180px;height:180px;border-radius:50%;border:1px solid ${color}44;pointer-events:none;"></div><div style="position:absolute;top:35px;right:35px;width:70px;height:70px;border-radius:50%;border:1px solid ${color}22;pointer-events:none;"></div><div style="position:absolute;bottom:-35px;left:-35px;width:140px;height:140px;border-radius:50%;border:1px solid ${color}18;pointer-events:none;"></div>`;}

function tag(txt,color){color=color||C.gold;return`<div style="display:flex;align-items:center;gap:7px;font-size:8px;font-weight:700;letter-spacing:2.5px;color:${color};text-transform:uppercase;margin-bottom:11px;"><span style="width:14px;height:1px;background:${color};flex-shrink:0;"></span>${txt}</div>`;}

function h(txt,size,italic){size=size||28;return`<h2 class="serif" style="font-size:${size}px;font-weight:900;color:#fff;line-height:1.18;font-style:${italic?"italic":"normal"};margin:0 0 10px;white-space:pre-line;">${txt}</h2>`;}

function p(txt,size,color){size=size||12;color=color||C.soft;return`<p style="font-size:${size}px;color:${color};line-height:1.6;margin:0 0 8px;">${txt}</p>`;}

function cover(s){return`<div class="cv-slide navy-bg" style="padding:22px 22px 26px;justify-content:space-between;">${rings()}<div style="display:flex;justify-content:space-between;align-items:center;position:relative;z-index:1;"><span style="font-size:9px;font-weight:700;color:${C.gold};letter-spacing:1px;">F&G Educational Society</span><span style="font-size:9px;color:${C.faint};">${s.ci} / 5</span></div><div style="flex:1;"></div><div style="position:relative;z-index:1;">${tag(s.tag)}${h(s.headline,26)}${s.body?p(s.body,11):""}${s.accent?`<div style="margin-top:14px;font-size:10px;color:${C.gold};font-weight:700;">${s.accent}</div>`:""}</div></div>`;}

function problem(s){return`<div class="cv-slide dark-bg" style="padding:22px;justify-content:center;">${tag(s.tag,"#E05555")}${h(s.headline,20)}<div style="margin:6px 0 10px;">${s.items.map(it=>`<div style="padding:9px 12px;margin-bottom:7px;background:rgba(224,85,85,0.09);border-radius:10px;border-left:3px solid ${C.red};border-radius:0 10px 10px 0;font-size:11px;color:${C.text};line-height:1.5;">${it}</div>`).join("")}</div>${s.body?p(s.body,11,C.gold):""}</div>`;}

function insight(s){return`<div class="cv-slide dark-bg" style="padding:22px;justify-content:center;">${tag(s.tag,C.red)}${h(s.headline,20)}${p(s.body,11)}${s.quote?`<div style="margin-top:12px;padding:12px 14px;border-left:3px solid ${C.gold};background:rgba(230,184,77,0.08);border-radius:0 10px 10px 0;font-family:'Playfair Display',serif;font-size:12px;font-style:italic;color:${C.gold};line-height:1.6;">"${s.quote}"</div>`:""}</div>`;}

function connection(s){return`<div class="cv-slide dark-bg" style="padding:22px;justify-content:center;"><div style="font-size:24px;margin-bottom:12px;">${s.icon}</div>${tag(s.tag)}${h(s.headline,19)}${p(s.body,11)}${s.insight?`<div style="margin-top:10px;padding:10px 12px;border-left:3px solid ${C.blueL};background:rgba(58,123,213,0.12);border-radius:0 10px 10px 0;font-size:11px;font-weight:600;color:${C.text};line-height:1.5;">→ ${s.insight}</div>`:""}</div>`;}

function solution(s){return`<div class="cv-slide blue-bg" style="padding:22px;justify-content:center;position:relative;">${rings()}<div style="position:relative;z-index:1;">${tag(s.tag)}${h(s.headline,20)}${s.body?p(s.body,11):""}${s.stats?`<div style="display:flex;gap:8px;margin-top:14px;">${s.stats.map(st=>`<div style="flex:1;text-align:center;padding:10px 4px;background:rgba(255,255,255,0.05);border-radius:10px;border:1px solid rgba(230,184,77,0.33);"><div style="font-family:'Playfair Display',serif;font-size:22px;font-weight:900;color:${C.gold};">${st.num}</div><div style="font-size:8px;color:${C.soft};margin-top:2px;text-transform:uppercase;letter-spacing:1px;">${st.label}</div></div>`).join("")}</div>`:""}</div></div>`;}

function cta(s){return`<div class="cv-slide blue-bg" style="padding:22px;justify-content:space-between;position:relative;">${rings(C.gold)}<div style="position:relative;z-index:1;"><span style="font-size:9px;font-weight:700;color:${C.gold};letter-spacing:1px;">F&G Educational Society</span></div><div style="position:relative;z-index:1;">${h(s.headline,24,true)}</div><div style="position:relative;z-index:1;"><a href="https://diplomadofyg.com" target="_blank" style="display:block;text-align:center;background:linear-gradient(135deg,${C.gold},${C.goldL});color:${C.navy};font-weight:800;font-size:13px;padding:13px 18px;border-radius:50px;text-decoration:none;margin-bottom:12px;">${s.cta}</a><div style="text-align:center;"><div style="font-size:10px;color:${C.soft};margin-bottom:5px;">📅 ${s.date}</div><div style="font-size:9px;font-weight:700;color:${C.gold};background:rgba(230,184,77,0.14);padding:4px 12px;border-radius:50px;display:inline-block;">⚡ ${s.urgency}</div></div></div></div>`;}

function speakers(s){let ac=s.areaColor||C.gold;return`<div class="cv-slide dark-bg" style="padding:20px 20px 16px;"><div style="display:flex;align-items:center;gap:9px;margin-bottom:12px;"><span style="font-size:20px;">${s.area}</span><div><div style="font-size:8px;font-weight:700;letter-spacing:2px;color:${ac};text-transform:uppercase;">${s.tag}</div><div style="font-size:9px;color:${C.faint};">Ponentes destacados</div></div></div><div style="display:flex;flex-direction:column;gap:7px;">${s.speakers.map(sp=>`<div style="padding:10px 12px;background:rgba(255,255,255,0.04);border-radius:10px;border-left:3px solid ${ac};border-radius:0 10px 10px 0;"><div style="font-family:'Playfair Display',serif;font-weight:700;font-size:11px;color:#fff;margin-bottom:2px;">${sp.name}</div><div style="font-size:9px;color:${ac};margin-bottom:2px;">${sp.country}</div><div style="font-size:9px;color:${C.soft};line-height:1.5;">${sp.role}</div></div>`).join("")}</div></div>`;}

function world(s){return`<div class="cv-slide blue-bg" style="padding:22px;justify-content:center;position:relative;">${rings()}<div style="position:relative;z-index:1;">${tag(s.tag)}${h(s.headline,20)}<div style="display:flex;flex-wrap:wrap;gap:5px;margin:10px 0;">${s.countries.map(c=>`<span style="font-size:10px;padding:3px 9px;background:rgba(255,255,255,0.07);border-radius:50px;color:${C.text};">${c}</span>`).join("")}</div>${p(s.body,11)}</div></div>`;}

function program(s){return`<div class="cv-slide dark-bg" style="padding:18px 18px 14px;"><div style="display:flex;align-items:center;gap:9px;margin-bottom:11px;"><div style="width:28px;height:28px;border-radius:8px;background:rgba(255,255,255,0.06);display:flex;align-items:center;justify-content:center;font-size:14px;border:1px solid rgba(255,255,255,0.1);">${s.icon}</div><div style="font-size:8px;font-weight:700;letter-spacing:2px;color:${s.color};text-transform:uppercase;">${s.tag}</div></div><div>${s.modules.map((m,i)=>`<div style="display:flex;gap:8px;align-items:flex-start;padding:5px 0;border-bottom:${i<s.modules.length-1?"1px solid rgba(255,255,255,0.05)":"none"};"><div style="width:15px;height:15px;border-radius:50%;background:rgba(255,255,255,0.07);color:${s.color};font-size:8px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;">${i+1}</div><div style="font-size:10px;color:${C.text};line-height:1.5;">${m}</div></div>`).join("")}</div>${s.ponentes?`<div style="margin-top:8px;padding:7px 10px;background:rgba(255,255,255,0.04);border-radius:8px;font-size:9px;color:${s.color};">🎓 ${s.ponentes}</div>`:""}</div>`;}

function benefits(s){return`<div class="cv-slide blue-bg" style="padding:22px;"><div style="margin-bottom:4px;">${tag(s.tag)}${h(s.headline,19)}</div><div style="display:flex;flex-direction:column;gap:6px;">${s.items.map(it=>`<div style="display:flex;gap:10px;align-items:center;padding:8px 10px;background:rgba(255,255,255,0.04);border-radius:9px;"><span style="font-size:14px;">${it.icon}</span><span style="font-size:10px;color:${C.text};line-height:1.5;">${it.text}</span></div>`).join("")}</div></div>`;}

function revelation(s){return`<div class="cv-slide blue-bg" style="padding:22px;justify-content:center;position:relative;">${rings(C.blueL)}<div style="position:relative;z-index:1;">${tag(s.tag)}${h(s.headline,20)}${s.body?p(s.body,11,C.text):""}${s.items?`<div style="margin-top:8px;">${s.items.map((it,i,a)=>`<div style="padding:7px 0;border-bottom:${i<a.length-1?"1px solid rgba(255,255,255,0.07)":"none"};font-size:11px;color:${C.text};">${it}</div>`).join("")}</div>`:""}</div></div>`;}

function comparison(s){return`<div class="cv-slide dark-bg" style="padding:18px 18px 14px;">${tag(s.tag,C.red)}<div style="display:flex;gap:8px;flex:1;"><div style="flex:1;padding:11px;border-radius:10px;background:rgba(224,85,85,0.08);border:1px solid rgba(224,85,85,0.22);"><div style="font-size:8px;font-weight:700;color:${C.red};text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;">✗ ${s.left.label}</div>${s.left.items.map((it,i,a)=>`<div style="font-size:10px;color:rgba(255,255,255,0.55);line-height:1.5;padding:4px 0;border-bottom:${i<a.length-1?"1px solid rgba(255,255,255,0.05)":"none"};">${it}</div>`).join("")}</div><div style="flex:1;padding:11px;border-radius:10px;background:rgba(230,184,77,0.09);border:1px solid rgba(230,184,77,0.44);"><div style="font-size:8px;font-weight:700;color:${C.gold};text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;">✓ ${s.right.label}</div>${s.right.items.map((it,i,a)=>`<div style="font-size:10px;color:${C.text};line-height:1.5;padding:4px 0;border-bottom:${i<a.length-1?"1px solid rgba(255,255,255,0.05)":"none"};">${it}</div>`).join("")}</div></div></div>`;}

function price(s){return`<div class="cv-slide dark-bg" style="padding:22px;justify-content:center;">${tag(s.tag)}${h(s.headline,18)}<div style="margin-top:10px;display:flex;flex-direction:column;gap:8px;">${s.options.map(op=>`<div style="padding:10px 12px;border-radius:10px;background:${op.highlight?`rgba(230,184,77,0.12)`:"rgba(255,255,255,0.04)"};border:${op.highlight?`1.5px solid rgba(230,184,77,0.55)`:"1px solid rgba(255,255,255,0.1)"};display:flex;justify-content:space-between;align-items:center;"><div><div style="font-size:11px;color:${op.highlight?C.gold:C.text};font-weight:600;margin-bottom:2px;">${op.label}</div><div style="font-size:9px;color:${C.faint};">${op.note}</div></div><div style="font-family:'Playfair Display',serif;font-weight:900;font-size:14px;color:${op.highlight?C.gold:"#fff"};">${op.price}</div></div>`).join("")}</div></div>`;}

function logistics(s){return`<div class="cv-slide dark-bg" style="padding:22px;">${tag(s.tag)}${h(s.headline,19)}<div style="flex:1;display:flex;flex-direction:column;justify-content:center;margin-top:6px;">${s.items.map((it,i,a)=>`<div style="display:flex;gap:10px;align-items:center;padding:8px 0;border-bottom:${i<a.length-1?"1px solid rgba(255,255,255,0.06)":"none"};"><span style="font-size:16px;width:24px;text-align:center;">${it.icon}</span><span style="font-size:11px;color:${C.text};line-height:1.4;">${it.text}</span></div>`).join("")}</div></div>`;}

function urgency(s){return`<div class="cv-slide" style="background:linear-gradient(148deg,#130A0A,${C.navy});padding:22px;justify-content:center;position:relative;"><div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:240px;height:240px;border-radius:50%;background:radial-gradient(circle,rgba(230,184,77,0.07) 0%,transparent 70%);pointer-events:none;"></div><div style="position:relative;z-index:1;">${tag(s.tag,C.red)}${h(s.headline,22)}${s.body?p(s.body,11):""}${s.urgency?`<div style="margin:14px 0;padding:10px 12px;background:rgba(230,184,77,0.16);border-radius:10px;border:1.5px solid rgba(230,184,77,0.5);font-size:11px;font-weight:700;color:${C.gold};text-align:center;">${s.urgency}</div>`:""}${s.sub?p(s.sub,10,C.soft):""}</div></div>`;}

function renderSlide(s){
  if(s.type==="cover")return cover(s);
  if(s.type==="problem")return problem(s);
  if(s.type==="insight")return insight(s);
  if(s.type==="connection")return connection(s);
  if(s.type==="solution")return solution(s);
  if(s.type==="cta")return cta(s);
  if(s.type==="speakers")return speakers(s);
  if(s.type==="world")return world(s);
  if(s.type==="program")return program(s);
  if(s.type==="benefits")return benefits(s);
  if(s.type==="revelation")return revelation(s);
  if(s.type==="comparison")return comparison(s);
  if(s.type==="price")return price(s);
  if(s.type==="logistics")return logistics(s);
  if(s.type==="urgency")return urgency(s);
  return "";
}

let ci=0,si=0;

function render(){
  const car=CAROUSELS[ci];
  const slide=car.slides[si];
  document.getElementById("frame").innerHTML=renderSlide(slide);
  const dots=document.getElementById("dots");
  dots.innerHTML=car.slides.map((_,i)=>`<div class="cv-dot${i===si?" active":""}" onclick="goTo(${i})"></div>`).join("");
  document.getElementById("prevBtn").disabled=si===0;
  document.getElementById("nextBtn").disabled=si===car.slides.length-1;
  document.getElementById("slideInfo").textContent=`${si+1} / ${car.slides.length}`;
  document.getElementById("carInfo").textContent=`Carrusel ${ci+1}: ${car.label}`;
  const tabs=document.getElementById("tabs");
  tabs.innerHTML=CAROUSELS.map((c,i)=>`<button class="cv-tab${i===ci?" active":""}" onclick="selectCar(${i})">${c.emoji} ${c.label}</button>`).join("");
}

function goTo(n){if(n>=0&&n<CAROUSELS[ci].slides.length){si=n;render();}}
function nav(d){goTo(si+d);}
function selectCar(n){ci=n;si=0;render();}

render();
</script>
